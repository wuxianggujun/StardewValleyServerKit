name: stardew-valley-server-kit

services:
  init-game-mods:
    image: busybox:1.36
    user: "0:0"
    entrypoint: ["sh", "-c", "mkdir -p /data/game/Mods /data/Mods/user && touch /data/game/Mods/SVSK_PLACEHOLDER.txt"]
    volumes:
      - ./data/mods:/data/Mods/user
    restart: "no"

  server:
    image: sdvd/server:${IMAGE_VERSION:-preview}
    container_name: sdv-server
    stdin_open: true
    tty: true
    ports:
      - "${VNC_PORT:-5800}:5800"
      - "${API_PORT:-8080}:${API_PORT:-8080}"
      - "${GAME_PORT:-24642}:24642/udp"
      - "${QUERY_PORT:-27015}:27015/udp"
    cap_add:
      # GOG GalaxyAuth 依赖容器内时间同步能力。
      - SYS_TIME
    volumes:
      - game-data:/data/game
      - saves:/config/xdg/config/StardewValley
      - ./data/settings:/data/settings
      - ./data/mods:/data/Mods/user
    environment:
      STEAM_AUTH_URL: "http://steam-auth:3001"
      VNC_PASSWORD: "${VNC_PASSWORD:-}"
      DISPLAY_WIDTH: "${DISPLAY_WIDTH:-1280}"
      DISPLAY_HEIGHT: "${DISPLAY_HEIGHT:-800}"
      XVNC_SERVER_CUSTOM_PARAMS: "${XVNC_SERVER_CUSTOM_PARAMS:--AcceptPointerEvents=1 -AcceptKeyEvents=1 -AcceptSetDesktopSize=1 -AlwaysShared=1 -DisconnectClients=0}"
      DISABLE_RENDERING: "${DISABLE_RENDERING:-false}"
      SETTINGS_PATH: "/data/settings/server-settings.json"
      API_ENABLED: "${API_ENABLED:-true}"
      API_PORT: "${API_PORT:-8080}"
      API_KEY: "${API_KEY:-}"
      SERVER_PASSWORD: "${SERVER_PASSWORD:-}"
      MAX_LOGIN_ATTEMPTS: "${MAX_LOGIN_ATTEMPTS:-3}"
      AUTH_TIMEOUT_SECONDS: "${AUTH_TIMEOUT_SECONDS:-120}"
      HEALTH_CHECK_SECONDS: "${HEALTH_CHECK_SECONDS:-300}"
      ENABLE_MOD_INCOMPATIBLE_OPTIMIZATIONS: "${ENABLE_MOD_INCOMPATIBLE_OPTIMIZATIONS:-true}"
      FORCE_NEW_DEBUG_GAME: "${FORCE_NEW_DEBUG_GAME:-false}"
      VERBOSE_LOGGING: "${VERBOSE_LOGGING:-false}"
    depends_on:
      init-game-mods:
        condition: service_completed_successfully
      steam-auth:
        condition: service_healthy
    restart: unless-stopped

  steam-auth:
    image: sdvd/steam-service:${IMAGE_VERSION:-preview}
    container_name: sdv-steam-auth
    stdin_open: true
    tty: true
    expose:
      - "3001"
    volumes:
      - steam-session:/data/steam-session
      - game-data:/data/game
    environment:
      PORT: "3001"
      GAME_DIR: "/data/game"
      SESSION_DIR: "/data/steam-session"
      STEAM_USERNAME: "${STEAM_USERNAME:-}"
      STEAM_PASSWORD: "${STEAM_PASSWORD:-}"
      STEAM_REFRESH_TOKEN: "${STEAM_REFRESH_TOKEN:-}"
    restart: unless-stopped

  discord-bot:
    image: sdvd/discord-bot:${IMAGE_VERSION:-preview}
    container_name: sdv-discord-bot
    profiles:
      - discord
    environment:
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      API_URL: "http://server:${API_PORT:-8080}"
      UPDATE_INTERVAL_MS: "${DISCORD_UPDATE_INTERVAL_MS:-30000}"
      DISCORD_BOT_NICKNAME: "${DISCORD_BOT_NICKNAME:-}"
      DISCORD_CHAT_CHANNEL_ID: "${DISCORD_CHAT_CHANNEL_ID:-}"
      API_KEY: "${API_KEY:-}"
    depends_on:
      - server
    restart: on-failure

volumes:
  steam-session:
  game-data:
  saves:
