<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Mod diagnostics preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbf7"/>
      <stop offset="1" stop-color="#f1f6fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1b2a38" flood-opacity=".16"/>
    </filter>
    <style>
      .title{font:700 28px "Segoe UI",Arial,sans-serif;fill:#17202a}
      .label{font:700 15px "Segoe UI",Arial,sans-serif;fill:#4d5b68}
      .body{font:600 17px "Segoe UI",Arial,sans-serif;fill:#17202a}
      .muted{font:500 14px "Segoe UI",Arial,sans-serif;fill:#6d7884}
      .mono{font:600 13px "Cascadia Mono","Consolas",monospace;fill:#43505d}
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="70" y="54" width="1140" height="650" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="70" y="54" width="1140" height="54" rx="18" fill="#15232f"/>
  <circle cx="104" cy="81" r="7" fill="#ff6b6b"/>
  <circle cx="128" cy="81" r="7" fill="#ffd166"/>
  <circle cx="152" cy="81" r="7" fill="#06d6a0"/>
  <text x="188" y="88" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600" fill="#d9e6f2">模组管理</text>
  <text x="104" y="154" class="title">Mod 加载检测</text>
  <text x="104" y="184" class="muted">区分“已安装”“容器可见”和“SMAPI 已确认加载”，避免把日志滚动误判为失败。</text>
  <rect x="104" y="220" width="244" height="102" rx="12" fill="#f8fafb" stroke="#e3e8ef"/>
  <text x="130" y="255" class="label">宿主机已安装</text>
  <text x="130" y="292" class="body">8 个用户 Mod</text>
  <rect x="376" y="220" width="244" height="102" rx="12" fill="#f8fafb" stroke="#e3e8ef"/>
  <text x="402" y="255" class="label">容器目录</text>
  <text x="402" y="292" class="body" fill="#157347">/data/Mods/user 可见</text>
  <rect x="648" y="220" width="244" height="102" rx="12" fill="#f8fafb" stroke="#e3e8ef"/>
  <text x="674" y="255" class="label">SMAPI 报告加载</text>
  <text x="674" y="292" class="body" fill="#157347">Loaded 10 mods</text>
  <rect x="920" y="220" width="244" height="102" rx="12" fill="#fff8e8" stroke="#f4ddaa"/>
  <text x="946" y="255" class="label">日志状态</text>
  <text x="946" y="292" class="body" fill="#9a6700">2 个空目录警告</text>
  <rect x="104" y="358" width="508" height="240" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="130" y="395" class="label">已加载</text>
  <rect x="130" y="420" width="430" height="32" rx="7" fill="#e6f4ea"/>
  <text x="148" y="442" class="body" fill="#157347">SVSK Crash Guard</text>
  <rect x="130" y="466" width="430" height="32" rx="7" fill="#eef4ff"/>
  <text x="148" y="488" class="body">JunimoServer</text>
  <rect x="130" y="512" width="430" height="32" rx="7" fill="#f8fafb"/>
  <text x="148" y="534" class="body">Console Commands / Save Backup</text>
  <rect x="650" y="358" width="514" height="240" rx="12" fill="#101820"/>
  <text x="678" y="395" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#d9e6f2">日志证据</text>
  <text x="678" y="430" class="mono" fill="#a7f3d0">Loaded 10 mods:</text>
  <text x="678" y="462" class="mono" fill="#d9e6f2">SVSK Crash Guard installed</text>
  <text x="678" y="494" class="mono" fill="#d9e6f2">from Mods/user/...</text>
  <text x="678" y="526" class="mono" fill="#fcd34d">Skipped: empty folder only</text>
  <text x="678" y="558" class="mono" fill="#a7f3d0">Mods loaded and ready</text>
  <rect x="104" y="624" width="224" height="36" rx="8" fill="#155eef"/>
  <text x="146" y="647" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">一键加载检测</text>
  <rect x="344" y="624" width="184" height="36" rx="8" fill="#f0f4f8"/>
  <text x="389" y="647" class="label">安装本地 zip</text>
</svg>
