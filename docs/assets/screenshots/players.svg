<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Player management preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#f5f0ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1b2a38" flood-opacity=".16"/>
    </filter>
    <style>
      .title{font:700 28px "Segoe UI",Arial,sans-serif;fill:#17202a}
      .label{font:700 15px "Segoe UI",Arial,sans-serif;fill:#4d5b68}
      .body{font:600 17px "Segoe UI",Arial,sans-serif;fill:#17202a}
      .muted{font:500 14px "Segoe UI",Arial,sans-serif;fill:#6d7884}
      .small{font:600 12px "Segoe UI",Arial,sans-serif;fill:#6d7884}
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="70" y="54" width="1140" height="650" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="70" y="54" width="1140" height="54" rx="18" fill="#15232f"/>
  <circle cx="104" cy="81" r="7" fill="#ff6b6b"/>
  <circle cx="128" cy="81" r="7" fill="#ffd166"/>
  <circle cx="152" cy="81" r="7" fill="#06d6a0"/>
  <text x="188" y="88" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600" fill="#d9e6f2">玩家和权限</text>
  <text x="104" y="154" class="title">玩家管理</text>
  <text x="104" y="184" class="muted">在线玩家、农场角色、管理员授权和 API 连接状态集中展示。</text>
  <rect x="104" y="224" width="508" height="430" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="132" y="264" class="label">在线玩家</text>
  <rect x="132" y="298" width="424" height="76" rx="10" fill="#eef4ff" stroke="#c7d7fe"/>
  <circle cx="166" cy="336" r="18" fill="#155eef"/>
  <text x="160" y="342" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#ffffff">M</text>
  <text x="202" y="327" class="body">mitaowx</text>
  <text x="202" y="352" class="muted">在线 · 已验证 · 主机</text>
  <rect x="132" y="394" width="424" height="76" rx="10" fill="#f8fafb" stroke="#e3e8ef"/>
  <circle cx="166" cy="432" r="18" fill="#7c3aed"/>
  <text x="160" y="438" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#ffffff">P</text>
  <text x="202" y="423" class="body">Player 2</text>
  <text x="202" y="448" class="muted">离线角色 · 可备份后删除</text>
  <rect x="132" y="500" width="132" height="34" rx="8" fill="#155eef"/>
  <text x="162" y="522" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">授予管理员</text>
  <rect x="280" y="500" width="132" height="34" rx="8" fill="#fff1f0"/>
  <text x="312" y="522" class="small" fill="#b42318">删除离线角色</text>
  <rect x="648" y="224" width="516" height="198" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="676" y="264" class="label">HTTP API</text>
  <text x="676" y="306" class="body" fill="#157347">已连接 · API_KEY 一致</text>
  <text x="676" y="336" class="muted">玩家、农场角色和授权状态可实时读取。</text>
  <rect x="648" y="456" width="516" height="198" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="676" y="496" class="label">安全提示</text>
  <text x="676" y="538" class="body">删除角色前自动备份 saves volume</text>
  <text x="676" y="568" class="muted">踢出 / 封禁若上游镜像无接口，会在页面中明确标记不可用。</text>
  <rect x="676" y="604" width="146" height="34" rx="8" fill="#f0f4f8"/>
  <text x="710" y="626" class="small">查看诊断日志</text>
</svg>
