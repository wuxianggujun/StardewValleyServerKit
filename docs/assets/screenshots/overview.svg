<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="Stardew Valley Server Kit admin overview preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f9f4"/>
      <stop offset="1" stop-color="#eef4fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1b2a38" flood-opacity=".16"/>
    </filter>
    <style>
      .title{font:700 28px "Segoe UI",Arial,sans-serif;fill:#17202a}
      .label{font:600 15px "Segoe UI",Arial,sans-serif;fill:#4d5b68}
      .body{font:500 18px "Segoe UI",Arial,sans-serif;fill:#17202a}
      .muted{font:500 14px "Segoe UI",Arial,sans-serif;fill:#6d7884}
      .small{font:600 12px "Segoe UI",Arial,sans-serif;fill:#6d7884}
      .ok{fill:#157347}.warn{fill:#9a6700}.bad{fill:#b42318}.blue{fill:#155eef}
    </style>
  </defs>
  <rect width="1280" height="760" rx="0" fill="url(#bg)"/>
  <rect x="70" y="54" width="1140" height="650" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="70" y="54" width="1140" height="54" rx="18" fill="#15232f"/>
  <circle cx="104" cy="81" r="7" fill="#ff6b6b"/>
  <circle cx="128" cy="81" r="7" fill="#ffd166"/>
  <circle cx="152" cy="81" r="7" fill="#06d6a0"/>
  <text x="188" y="88" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="600" fill="#d9e6f2">Stardew Valley Server Kit</text>
  <rect x="92" y="132" width="214" height="538" rx="10" fill="#f4f7f9"/>
  <text x="116" y="169" class="label">管理面板</text>
  <rect x="112" y="197" width="154" height="34" rx="7" fill="#e6f4ea"/>
  <text x="132" y="219" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#157347">概览</text>
  <text x="132" y="270" class="muted">玩家</text>
  <text x="132" y="316" class="muted">存档</text>
  <text x="132" y="362" class="muted">模组</text>
  <text x="132" y="408" class="muted">配置</text>
  <text x="132" y="454" class="muted">日志</text>
  <rect x="334" y="132" width="820" height="86" rx="12" fill="#f8fafb"/>
  <text x="362" y="169" class="title">农场在线状态</text>
  <text x="362" y="199" class="muted">健康运行、加入信息、端口映射和最近保存状态集中在一个页面。</text>
  <rect x="992" y="158" width="132" height="32" rx="16" fill="#e6f4ea"/>
  <text x="1024" y="180" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#157347">Healthy</text>
  <rect x="334" y="246" width="250" height="128" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="360" y="283" class="label">服务端</text>
  <text x="360" y="326" class="body ok">sdv-server healthy</text>
  <text x="360" y="350" class="muted">运行 2h 14m</text>
  <rect x="618" y="246" width="250" height="128" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="644" y="283" class="label">当前农场</text>
  <text x="644" y="326" class="body">mitaowx</text>
  <text x="644" y="350" class="muted">春 21 日，第 1 年</text>
  <rect x="902" y="246" width="252" height="128" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="928" y="283" class="label">玩家</text>
  <text x="928" y="326" class="body blue">1 / 4 在线</text>
  <text x="928" y="350" class="muted">最近保存已检测</text>
  <rect x="334" y="402" width="390" height="212" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="362" y="438" class="label">加入方式</text>
  <text x="362" y="479" class="body">119.3.221.4:24642</text>
  <text x="362" y="510" class="muted">UDP 24642 / 27015 已映射</text>
  <rect x="362" y="546" width="142" height="34" rx="8" fill="#155eef"/>
  <text x="397" y="568" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">复制加入信息</text>
  <rect x="764" y="402" width="390" height="212" rx="12" fill="#ffffff" stroke="#e3e8ef"/>
  <text x="792" y="438" class="label">安全操作</text>
  <text x="792" y="479" class="body">等待保存后停服</text>
  <text x="792" y="510" class="muted">在线玩家存在时避免直接断电式停服</text>
  <rect x="792" y="546" width="116" height="34" rx="8" fill="#f0f4f8"/>
  <text x="819" y="568" class="small">重启服务端</text>
  <rect x="922" y="546" width="132" height="34" rx="8" fill="#fff4e5"/>
  <text x="950" y="568" class="small" fill="#9a6700">停服释放资源</text>
</svg>
